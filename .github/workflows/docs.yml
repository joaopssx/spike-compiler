name: docs

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate documentation tree
        run: python3 -c "from pathlib import Path; required=['docs/en/getting-started.md','docs/pt/getting-started.md','docs/index.md','docs/mkdocs.yml']; missing=[p for p in required if not Path(p).exists()]; assert not missing, missing"

      - name: Validate website entrypoints
        run: python3 -c "from pathlib import Path; required=['website/index.html','website/docs.html','website/tutorial.html']; missing=[p for p in required if not Path(p).exists()]; assert not missing, missing"
