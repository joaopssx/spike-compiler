<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spike - Page not found</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="site-shell">
        <section class="hero" style="padding-top: 72px;">
            <div class="hero-copy">
                <div class="eyebrow">404</div>
                <h1>Page not found.</h1>
                <p>The route you tried to open does not exist on the Spike website. Go back to the homepage or jump straight to the tutorial.</p>
                <div class="hero-actions">
                    <a class="button button-primary" href="index.html">Back to home</a>
                    <a class="button button-secondary" href="tutorial.html">Open tutorial</a>
                </div>
            </div>
            <div class="hero-panel terminal">
                <div class="terminal-bar">
                    <div class="terminal-dots">
                        <span class="terminal-dot"></span>
                        <span class="terminal-dot"></span>
                        <span class="terminal-dot"></span>
                    </div>
                    <span class="terminal-label">spike pages</span>
                </div>
                <pre><code>Error: route not found

Try:
- /index.html
- /docs.html
- /tutorial.html</code></pre>
            </div>
        </section>
    </div>
</body>
</html>
